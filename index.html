<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidShare</title>
<script>
const API_URL = "https://web-production-6447.up.railway.app";

async function analyze() {
  const url = document.getElementById('url').value.trim();
  if (!url) return alert('ادخل رابط');
  document.getElementById('status').textContent = 'جاري التحليل...';
  try {
    const r = await fetch(API_URL+'/analyze', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url})});
    const d = await r.json();
    if (d.error) { document.getElementById('status').textContent = '❌ '+d.error; return; }
    document.getElementById('status').textContent = '✅ '+d.title;
    document.getElementById('info').style.display='block';
    document.getElementById('title').textContent = d.title;
    document.getElementById('platform').textContent = d.platform + ' - ' + d.duration;
    const qs = document.getElementById('qualities');
    qs.innerHTML = '';
    (d.qualities||[]).forEach(q => {
      const o = document.createElement('option');
      o.value = q.id; o.textContent = q.label; qs.appendChild(o);
    });
    window._url = url;
  } catch(e) { document.getElementById('status').textContent = '❌ فشل الاتصال'; }
}

async function download() {
  if (!window._url) return;
  document.getElementById('status').textContent = 'جاري التحميل...';
  const fmt = document.getElementById('qualities').value;
  try {
    const r = await fetch(API_URL+'/download', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url:window._url, format_id:fmt})});
    const blob = await r.blob();
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'video.mp4'; a.click();
    document.getElementById('status').textContent = '✅ تم التحميل!';
  } catch(e) { document.getElementById('status').textContent = '❌ فشل التحميل'; }
}
</script>
<style>
body{font-family:Arial;background:#0a0a1a;color:#fff;padding:20px;direction:rtl}
input{width:100%;padding:12px;border-radius:8px;border:none;margin:10px 0;font-size:16px}
button{background:#7c3aed;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;margin:5px}
select{width:100%;padding:10px;border-radius:8px;margin:10px 0;font-size:16px}
#info{display:none;background:#1a1a2e;padding:15px;border-radius:10px;margin:15px 0}
h1{color:#7c3aed}
</style>
</head>
<body>
<h1>🎬 VidShare</h1>
<input id="url" placeholder="الصق رابط الفيديو هنا..." />
<button onclick="analyze()">🔍 تحليل</button>
<p id="status"></p>
<div id="info">
  <p id="title"></p>
  <p id="platform"></p>
  <select id="qualities"></select>
  <button onclick="download()">⬇️ تحميل</button>
</div>
</body>
</html>
